<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{WIDTH}} {{HEIGHT}}" width="{{WIDTH}}" height="{{HEIGHT}}">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family={{FONT_DISPLAY_URL}}:wght@700;800&amp;family={{FONT_BODY_URL}}:wght@400;500&amp;display=swap');
      .quote-massive { font-family: '{{FONT_DISPLAY}}', serif; font-weight: 700; font-style: italic; font-size: 72px; fill: {{COLOR_ACCENT}}; letter-spacing: -0.01em; }
      .attribution-tiny { font-family: '{{FONT_BODY}}', sans-serif; font-weight: 400; font-size: 22px; fill: {{COLOR_MUTED}}; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
  </defs>
  {{BACKGROUND}}
  {{DECORATIONS}}
  <text x="100" y="500" class="quote-massive">
    <tspan x="100" dy="0">{{QUOTE_LINE_1}}</tspan>
    <tspan x="100" dy="90">{{QUOTE_LINE_2}}</tspan>
    <tspan x="100" dy="90">{{QUOTE_LINE_3}}</tspan>
    <tspan x="100" dy="90">{{QUOTE_LINE_4}}</tspan>
  </text>
  <text x="{{WIDTH_MINUS_100}}" y="{{BOTTOM_Y_MINUS_40}}" class="attribution-tiny" text-anchor="end">{{QUOTE_ATTRIBUTION}}</text>
  {{NUMBERING}}
</svg>
