<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{WIDTH}} {{HEIGHT}}" width="{{WIDTH}}" height="{{HEIGHT}}">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family={{FONT_DISPLAY_URL}}:wght@700;800&amp;family={{FONT_BODY_URL}}:wght@400;500&amp;display=swap');
      .stat-small { font-family: '{{FONT_DISPLAY}}', serif; font-weight: 800; font-size: 180px; fill: {{COLOR_ACCENT}}; letter-spacing: -0.03em; }
      .label-mid { font-family: '{{FONT_DISPLAY}}', serif; font-weight: 700; font-size: 54px; fill: {{COLOR_TEXT}}; }
      .context-big { font-family: '{{FONT_DISPLAY}}', serif; font-weight: 700; font-size: 48px; fill: {{COLOR_TEXT}}; }
    </style>
  </defs>
  {{BACKGROUND}}
  {{DECORATIONS}}
  <text x="{{CENTER_X}}" y="400" class="stat-small" text-anchor="middle">{{STAT_VALUE}}</text>
  <text x="{{CENTER_X}}" y="520" class="label-mid" text-anchor="middle">{{STAT_LABEL}}</text>
  <text x="{{CENTER_X}}" y="720" class="context-big" text-anchor="middle">{{STAT_CONTEXT}}</text>
  {{NUMBERING}}
</svg>
