<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{WIDTH}} {{HEIGHT}}" width="{{WIDTH}}" height="{{HEIGHT}}">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family={{FONT_DISPLAY_URL}}:wght@700&amp;family={{FONT_BODY_URL}}:wght@400;500&amp;display=swap');
      .quote-mark { font-family: '{{FONT_DISPLAY}}', serif; font-weight: 700; font-size: 280px; fill: {{COLOR_ACCENT}}; opacity: 0.85; }
      .quote { font-family: '{{FONT_DISPLAY}}', serif; font-weight: 700; font-style: italic; font-size: 58px; fill: {{COLOR_TEXT}}; }
      .attribution { font-family: '{{FONT_BODY}}', sans-serif; font-weight: 500; font-size: 30px; fill: {{COLOR_MUTED}}; letter-spacing: 0.05em; }
    </style>
  </defs>
  {{BACKGROUND}}
  {{DECORATIONS}}
  <text x="100" y="360" class="quote-mark">"</text>
  <text x="100" y="{{CENTER_Y}}" class="quote">
    <tspan x="100" dy="0">{{QUOTE_LINE_1}}</tspan>
    <tspan x="100" dy="76">{{QUOTE_LINE_2}}</tspan>
    <tspan x="100" dy="76">{{QUOTE_LINE_3}}</tspan>
    <tspan x="100" dy="76">{{QUOTE_LINE_4}}</tspan>
  </text>
  <text x="100" y="{{BOTTOM_Y_MINUS_40}}" class="attribution">— {{QUOTE_ATTRIBUTION}}</text>
  {{NUMBERING}}
</svg>
