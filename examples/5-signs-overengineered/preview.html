<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Carousel Preview</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #eaeaea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    .slide {
      display: block;
      width: min(540px, 90vw);
      height: auto;
      aspect-ratio: 1080 / 1350;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      background: #111;
    }
    .meta {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="meta">7 slides</div>
    <object class="slide" type="image/svg+xml" data="slide-01.svg"></object>
    <object class="slide" type="image/svg+xml" data="slide-02.svg"></object>
    <object class="slide" type="image/svg+xml" data="slide-03.svg"></object>
    <object class="slide" type="image/svg+xml" data="slide-04.svg"></object>
    <object class="slide" type="image/svg+xml" data="slide-05.svg"></object>
    <object class="slide" type="image/svg+xml" data="slide-06.svg"></object>
    <object class="slide" type="image/svg+xml" data="slide-07.svg"></object>
</body>
</html>
