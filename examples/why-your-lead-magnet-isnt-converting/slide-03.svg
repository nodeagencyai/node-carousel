<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=Space+Grotesk:wght@400;500&amp;display=swap');
      .quote-mark { font-family: 'Space Grotesk', serif; font-weight: 700; font-size: 280px; fill: #FFD23F; opacity: 0.85; }
      .quote { font-family: 'Space Grotesk', serif; font-weight: 700; font-style: italic; font-size: 58px; fill: #FFFFFF; }
      .attribution { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 30px; fill: #AAAAAA; letter-spacing: 0.05em; }
      .counter { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 22px; fill: #AAAAAA; letter-spacing: 0.1em; }
    </style>
  </defs>
  <defs>
  <linearGradient id="bg-gradient" gradientTransform="rotate(160, 0.5, 0.5)">
    <stop offset="0%" stop-color="#1A0F2E"/>
    <stop offset="100%" stop-color="#4A1D5C"/>
  </linearGradient>
</defs>
<rect x="0" y="0" width="1080" height="1350" fill="url(#bg-gradient)"/>

  <text x="100" y="360" class="quote-mark">"</text>
  <text x="100" y="675" class="quote">
    <tspan x="100" dy="0">The magnet isn&apos;t</tspan>
    <tspan x="100" dy="76">the offer.</tspan>
    <tspan x="100" dy="76">It&apos;s the audition</tspan>
    <tspan x="100" dy="76">for the offer.</tspan>
  </text>
  <text x="100" y="1210" class="attribution">— Lift</text>
  <text x="980" y="1250" class="counter" text-anchor="end">03 / 05</text>
</svg>
