<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{WIDTH}} {{HEIGHT}}" width="{{WIDTH}}" height="{{HEIGHT}}">
  <defs>
    <style>
      {{FONT_IMPORTS}}
      .stat-value { font-family: {{FONT_DISPLAY_STACK}}; font-weight: 800; font-size: {{TYPE_STAT}}px; fill: {{ACCENT}}; letter-spacing: {{TYPE_LETTERSPACE_STAT}}; }
      .stat-label { font-family: {{FONT_DISPLAY_STACK}}; font-weight: 700; font-size: {{TYPE_SUBHEAD}}px; fill: {{ON_SURFACE}}; letter-spacing: -0.02em; }
      .stat-context { font-family: {{FONT_BODY_STACK}}; font-weight: 400; font-size: {{TYPE_BODY}}px; fill: {{SURFACE_MUTED}}; }
      .handle { font-family: {{FONT_BODY_STACK}}; font-weight: 500; font-size: 26px; fill: {{SURFACE_MUTED}}; letter-spacing: 0.05em; }
    </style>
  </defs>
  {{BACKGROUND}}
  {{DECORATIONS}}
  {{NUMBERING}}
  <g color="{{ACCENT}}" transform="translate({{ICON_STAT_X}} {{ICON_STAT_Y}}) scale(1.67)" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ICON}}</g>
  <text x="{{CENTER_X}}" y="{{ANCHOR_STAT_Y}}" class="stat-value" text-anchor="middle">{{STAT_VALUE}}</text>
  <text x="{{CENTER_X}}" y="{{ANCHOR_STAT_LABEL_Y}}" class="stat-label" text-anchor="middle">{{STAT_LABEL}}</text>
  <text x="{{CENTER_X}}" y="{{ANCHOR_STAT_CONTEXT_Y}}" class="stat-context" text-anchor="middle">{{STAT_CONTEXT}}</text>
  <text x="{{CENTER_X}}" y="{{ANCHOR_FOOTER_CENTER}}" class="handle" text-anchor="middle">{{BRAND_HANDLE}}</text>
</svg>
