<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{WIDTH}} {{HEIGHT}}" width="{{WIDTH}}" height="{{HEIGHT}}">
  <defs>
    <style>
      {{FONT_IMPORTS}}
      .zone-label { font-family: {{FONT_BODY_STACK}}; font-weight: 500; font-size: {{TYPE_BODY}}px; letter-spacing: 0.22em; text-transform: uppercase; fill: {{ACCENT}}; }
      .zone-line { font-family: {{FONT_DISPLAY_STACK}}; font-weight: 700; font-size: {{TYPE_BODY_LARGE}}px; fill: {{ON_SURFACE}}; }
      .handle { font-family: {{FONT_BODY_STACK}}; font-weight: 500; font-size: 26px; fill: {{SURFACE_MUTED}}; letter-spacing: 0.05em; }
    </style>
  </defs>
  {{BACKGROUND}}
  {{DECORATIONS}}
  {{NUMBERING}}
  <line x1="{{CENTER_X}}" y1="{{ANCHOR_BODY_TOP}}" x2="{{CENTER_X}}" y2="{{ANCHOR_BODY_BOTTOM}}" stroke="{{SURFACE_MUTED}}" stroke-opacity="0.3" stroke-width="2"/>
  <g color="{{ACCENT}}" transform="translate({{ICON_LEFT_X}} {{ICON_ZONE_Y}}) scale(1.5)" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ICON_LEFT}}</g>
  <g color="{{ACCENT}}" transform="translate({{ICON_RIGHT_X}} {{ICON_ZONE_Y}}) scale(1.5)" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ICON_RIGHT}}</g>
  <text x="{{LEFT_ZONE_CENTER_X}}" y="{{ANCHOR_ZONE_LABEL_Y}}" class="zone-label" text-anchor="middle">{{LEFT_LABEL}}</text>
  <text x="{{LEFT_ZONE_CENTER_X}}" y="{{ANCHOR_LINE_1_Y}}" class="zone-line" text-anchor="middle">{{LEFT_LINE_1}}</text>
  <text x="{{LEFT_ZONE_CENTER_X}}" y="{{ANCHOR_LINE_2_Y}}" class="zone-line" text-anchor="middle">{{LEFT_LINE_2}}</text>
  <text x="{{LEFT_ZONE_CENTER_X}}" y="{{ANCHOR_LINE_3_Y}}" class="zone-line" text-anchor="middle">{{LEFT_LINE_3}}</text>
  <text x="{{RIGHT_ZONE_CENTER_X}}" y="{{ANCHOR_ZONE_LABEL_Y}}" class="zone-label" text-anchor="middle">{{RIGHT_LABEL}}</text>
  <text x="{{RIGHT_ZONE_CENTER_X}}" y="{{ANCHOR_LINE_1_Y}}" class="zone-line" text-anchor="middle">{{RIGHT_LINE_1}}</text>
  <text x="{{RIGHT_ZONE_CENTER_X}}" y="{{ANCHOR_LINE_2_Y}}" class="zone-line" text-anchor="middle">{{RIGHT_LINE_2}}</text>
  <text x="{{RIGHT_ZONE_CENTER_X}}" y="{{ANCHOR_LINE_3_Y}}" class="zone-line" text-anchor="middle">{{RIGHT_LINE_3}}</text>
  <text x="{{WIDTH_MINUS_MARGIN}}" y="{{ANCHOR_FOOTER_CENTER}}" class="handle" text-anchor="end">{{BRAND_HANDLE}}</text>
</svg>
