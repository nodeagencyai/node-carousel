<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{WIDTH}} {{HEIGHT}}" width="{{WIDTH}}" height="{{HEIGHT}}">
  <defs>
    <style>
      {{FONT_IMPORTS}}
      .kicker { font-family: {{FONT_BODY_STACK}}; font-weight: 500; font-size: 26px; letter-spacing: 0.22em; text-transform: uppercase; fill: {{ACCENT}}; }
      .headline { font-family: {{FONT_DISPLAY_STACK}}; font-weight: 800; font-size: {{TYPE_HERO}}px; fill: {{ON_SURFACE}}; letter-spacing: {{TITLE_LETTER_SPACING}}; }
      .handle { font-family: {{FONT_BODY_STACK}}; font-weight: 500; font-size: 26px; fill: {{SURFACE_MUTED}}; letter-spacing: 0.05em; }
      .accent-rule { stroke: {{ACCENT}}; stroke-width: 3; }
    </style>
  </defs>
  {{BACKGROUND}}
  {{DECORATIONS}}
  {{NUMBERING}}
  <text x="{{COL_1_X}}" y="{{ANCHOR_FLAG_TOP}}" class="kicker">{{KICKER}}</text>
  <line x1="{{COL_1_X}}" y1="{{ACCENT_RULE_Y}}" x2="{{ACCENT_RULE_X_END}}" y2="{{ACCENT_RULE_Y}}" class="accent-rule"/>
  <text x="{{COL_1_X}}" y="{{HEADLINE_BOTTOM_Y}}" class="headline">
    <tspan x="{{COL_1_X}}" dy="0">{{HEADLINE_LINE_1}}</tspan>
    <tspan x="{{COL_1_X}}" dy="{{HEADLINE_DY}}">{{HEADLINE_LINE_2}}</tspan>
  </text>
  <text x="{{WIDTH_MINUS_MARGIN}}" y="{{ANCHOR_FOOTER_CENTER}}" class="handle" text-anchor="end">{{BRAND_HANDLE}}</text>
</svg>
