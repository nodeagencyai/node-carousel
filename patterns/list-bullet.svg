<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {{WIDTH}} {{HEIGHT}}" width="{{WIDTH}}" height="{{HEIGHT}}">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family={{FONT_DISPLAY_URL}}:wght@700;800&amp;family={{FONT_BODY_URL}}:wght@400;500;600&amp;display=swap');
      .headline { font-family: {{FONT_DISPLAY_STACK}}; font-weight: 700; font-size: {{TYPE_SUBHEAD}}px; fill: {{ON_SURFACE}}; letter-spacing: {{SUBHEAD_LETTER_SPACING}}; }
      .arrow { font-family: {{FONT_BODY_STACK}}; font-weight: 600; font-size: {{TYPE_BODY_LARGE}}px; fill: {{ACCENT}}; }
      .item { font-family: {{FONT_BODY_STACK}}; font-weight: 500; font-size: {{TYPE_BODY_LARGE}}px; fill: {{ON_SURFACE}}; }
      .handle { font-family: {{FONT_BODY_STACK}}; font-weight: 500; font-size: 26px; fill: {{SURFACE_MUTED}}; letter-spacing: 0.05em; }
    </style>
  </defs>
  {{BACKGROUND}}
  {{DECORATIONS}}
  {{NUMBERING}}
  <text x="{{COL_1_X}}" y="{{ANCHOR_BODY_TOP}}" class="headline">{{HEADLINE}}</text>
  <g transform="translate({{COL_1_X}}, {{LIST_GROUP_Y}})">
    <text x="0" y="0" class="arrow">{{ARROW_1}}</text>
    <text x="64" y="0" class="item">{{ITEM_1}}</text>
    <text x="0" y="{{ROW_SPACING_BULLET}}" class="arrow">{{ARROW_2}}</text>
    <text x="64" y="{{ROW_SPACING_BULLET}}" class="item">{{ITEM_2}}</text>
    <text x="0" y="{{ROW_SPACING_BULLET_2}}" class="arrow">{{ARROW_3}}</text>
    <text x="64" y="{{ROW_SPACING_BULLET_2}}" class="item">{{ITEM_3}}</text>
    <text x="0" y="{{ROW_SPACING_BULLET_3}}" class="arrow">{{ARROW_4}}</text>
    <text x="64" y="{{ROW_SPACING_BULLET_3}}" class="item">{{ITEM_4}}</text>
    <text x="0" y="{{ROW_SPACING_BULLET_4}}" class="arrow">{{ARROW_5}}</text>
    <text x="64" y="{{ROW_SPACING_BULLET_4}}" class="item">{{ITEM_5}}</text>
  </g>
  <text x="{{WIDTH_MINUS_MARGIN}}" y="{{ANCHOR_FOOTER_CENTER}}" class="handle" text-anchor="end">{{BRAND_HANDLE}}</text>
</svg>
